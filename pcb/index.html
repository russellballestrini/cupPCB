<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1.0.2.10 // OPENAI_AUTONOMY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* 7-BIT ASCII ONLY */
        :root {
            --w-bg: #ffffff; --w-panel: #0d0d16; --w-border: #333333;
            --w-text: #ffffff; --pcb-gold: #ffd700; --pcb-bg: #000000;
        }
        * { box-sizing: border-box; font-size: 9px; color: var(--w-text); }
        body { margin: 0; background: #050508; font-family: "Courier New", monospace; display: grid; grid-template-rows: 50px 1fr; height: 100vh; overflow: hidden; }
        #header { padding: 0 20px; border-bottom: 1px solid var(--w-border); display: flex; justify-content: space-between; align-items: center; background: var(--w-panel); z-index: 100; }
        #main { display: grid; grid-template-columns: 1fr 420px; grid-template-rows: 1fr; position: relative; height: 100%; overflow: hidden; }
        #viewport { background: var(--w-bg); position: absolute; inset: 0; touch-action: none; }

        #draw-overlay { position: absolute; top: 10px; left: 10px; border: 1px solid var(--w-border); background: rgba(255,255,255,0.7); z-index: 1000; cursor: crosshair; touch-action: none; }

        #sidebar { background: var(--w-panel); padding: 12px; display: flex; flex-direction: column; gap: 8px; border-left: 1px solid var(--w-border); width: 420px; overflow-y: auto; scrollbar-width: thin; }
        .module { border: 1px solid var(--w-border); padding: 8px; background: rgba(255, 255, 255, 0.05); }
        .module h3 { margin: 0 0 5px 0; font-size: 0.85em; border-bottom: 1px solid var(--w-border); text-transform: uppercase; }
        #pcb-container { background: var(--pcb-bg); border: 2px solid var(--pcb-gold); padding: 10px; }
        #pcb-source { width: 100%; height: 60px; background: #000; border: 1px solid #333; color: var(--pcb-gold); font-family: monospace; padding: 6px; resize: none; outline: none; }
        #pcb-output { height: 40px; overflow-y: scroll; background: #050505; border: 1px solid #111; padding: 4px; font-size: 8px; color: #888; white-space: pre-wrap; margin-top: 5px; border-top: 1px solid var(--pcb-gold); }
        .btn-pcb { background: #000; border: 1px solid var(--pcb-gold); color: var(--pcb-gold); padding: 5px; cursor: pointer; text-transform: uppercase; font-size: 8px; width: 100%; }
        .btn { width: 100%; padding: 7px; background: #111; border: 1px solid var(--w-border); color: #fff; cursor: pointer; text-transform: uppercase; }
        .matrix-grid { display: grid; grid-template-columns: 30px 1fr 1fr 1fr 1fr; gap: 2px; text-align: center; margin-top: 4px; }
        .m-val { font-family: monospace; color: #68ff9a; font-size: 8px; }
    </style>
    <style>
        /* MOBILE */
        @media (max-width: 768px) {
            #main { grid-template-columns: 1fr; grid-template-rows: 44vh 1fr; }
            #viewport-container { height: 44vh; position: relative; overflow: hidden; }
            #sidebar { width: 100%; border-left: none; border-top: 1px solid var(--w-border); display: flex; flex-direction: row; flex-wrap: wrap; gap: 6px; max-height: calc(56vh - 50px); }
            .module { min-width: calc(50% - 3px); flex: 1; }
            #pcb-container { min-width: 100%; }
            #draw-overlay { left: 10px; top: 10px; width: calc(100% - 20px) !important; height: calc(44vh - 20px) !important; }
            #pcb-source { height: 44px; }
            #pcb-output { height: 30px; }
            * { font-size: 10px; }
            .btn { padding: 10px 7px; }
            .btn-pcb { padding: 8px; }
        }
        @media (max-width: 480px) {
            .module { min-width: 100%; }
        }
    </style>
    <style>
        #boot-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
            padding: 10vh 12vw;
            font-family: "Courier New", monospace;
            font-size: 11px;

            transition: opacity 0.6s ease;
        }
        #boot-overlay.fade { opacity: 0; pointer-events: none; }
        #boot-log { width: 100%; max-width: 560px; }
        .boot-line {
            display: flex; justify-content: space-between;
            opacity: 0; margin: 2px 0;

        .boot-line.show { opacity: 1; }
        .boot-line .ok  { color: #68ff9a; }
        .boot-line .err { color: #ff3232; }
        .boot-line .dim { color: #444; }
        .boot-cursor {
            display: inline-block; width: 8px; height: 11px;
            background: #ffd700; vertical-align: middle;
            animation: blink 0.6s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        #boot-title {
            font-size: 14px; letter-spacing: 0.25em; margin-bottom: 24px;
            color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.4);
        }
        #boot-bar-wrap { margin-top: 16px; width: 100%; max-width: 560px; }
        #boot-bar-bg { background: #111; height: 3px; width: 100%; }
        #boot-bar    { background: #ffd700; height: 3px; width: 0%; transition: width 0.12s linear; }

<body>
<div id="boot-overlay">
    <div id="boot-title">ARK_BIOS v1.0.2.10</div>
    <div id="boot-log"></div>
    <div id="boot-bar-wrap">
        <div id="boot-bar-bg"><div id="boot-bar"></div></div>
    </div>
</div>

<div id="header">
    <div>ARK_ID: 1.0.2.10 // OPENAI_AUTONOMY</div>
    <div id="status">AGENT_COMMAND_HOOKS: ON</div>
</div>
<div id="main">
    <div id="viewport-container">
        <canvas id="draw-overlay" width="200" height="200"></canvas>
        <div id="viewport"></div>
    </div>
    <div id="sidebar">
        <div class="module" id="pcb-container">
            <h3>POCKET_CUP_BOX_CONSOLE</h3>
            <textarea id="pcb-source" placeholder="sys.connect('frontier')"></textarea>
            <button class="btn-pcb" id="run-pcb">RUN_ADMIN_CMD</button>
            <div id="pcb-output">PCB_STATUS: IDLE.</div>
        </div>
        <div class="module">
            <h3>ORACLE_HEURISTICS</h3>
            <input type="text" id="oracle-field" style="width:100%; background:#000; border:1px solid #9400d3; color:#68ff9a; padding:4px;" value="Math.sin(t * 0.05) * 5">
        </div>
        <div class="module">
            <h3>AGENT_LABS_MATRIX</h3>
            <div class="matrix-grid">
                <div style="font-size:7px; color:#444;">ID</div><div style="font-size:7px; color:#444;">LIFE</div><div style="font-size:7px; color:#444;">SAP</div><div style="font-size:7px; color:#444;">BLM</div><div style="font-size:7px; color:#444;">MODE</div>
            </div>
            <div id="matrix-body"></div>
        </div>
        <div class="module">
            <h3>REIFY TOOLS</h3>
            <button class="btn" id="inscribe-btn" style="border-color:var(--pcb-gold);">INSCRIBE_DRAW_TO_PCB</button>
            <button class="btn" id="friend-btn" style="margin-top:4px;" disabled>DEPLOY_FRIENDS</button>
            <button class="btn" id="solve-btn" style="margin-top:4px;">REIFY_MANIFOLD</button>
        </div>
        <button class="btn" style="color:#ff3232; border-color:#ff3232; margin-top:10px;" onclick="location.reload()">PURGE_SESSION</button>
    </div>
</div>
<script>
let scene, camera, renderer, controls, tick = 0;
let meshVertices = [], originalVertices = [], adjacency = [], friendList = [], manifoldMesh;
let seedPoints = [], flickerRate = 0.05, wobbleBase = 2.0;
// HEAT: diffusion buffer
let heat = [];
// SEAM: the diagonal of Sym^2 -- where u==v, the degenerate locus
let seamLine = null;
// FRONTIER: liminal connection flag
let frontierConnected = false;
const layerKeys = ["g", "r", "c", "y", "v"];

class PCBInterpreter {
    log(msg) { const out = document.getElementById("pcb-output"); out.textContent += "\n> " + msg; out.scrollTop = out.scrollHeight; }
    run(source) {
        this.log("PURGING_DRAWPAD...");
        const canvas = document.getElementById("draw-overlay"), ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height); seedPoints = [];
        const input = source.trim();

        if (input.startsWith("sys.connect")) {
            frontierConnected = true;
            document.getElementById("status").textContent = "FRONTIER: OPEN";
            this.log("FRONTIER: Liminal channel open. Speak.");
            return;
        }

        let sum = 0; for(let i=0; i<input.length; i++) sum += input.charCodeAt(i);
        flickerRate = (sum % 127) / 1000 + 0.02;
        wobbleBase = (sum / (input.length || 1)) / 32;

        if (input === "E>.<3") this.injectHeart(ctx);
        else if (input.startsWith("manifold.")) {
            let m = input.match(/manifold\.\(\[(.*)\]\)/);
            if (m) this.injectPoints(m[1].split(",").map(Number), ctx);
        } else if (/[=\.\(]/.test(input)) {
            // REPL: input looks like code -- eval with full session scope
            try {
                const result = eval(input);
                this.log("OK: " + (result !== undefined ? String(result) : "done"));
            } catch(e) { this.log("ERR: " + e.message); }
        } else if (frontierConnected && !/[=\.\(]/.test(input)) {
            // FRONTIER: send to Claude -- response can be text or live PCB commands
            this.log("FRONTIER >> " + input);
            this.callFrontier(input);
        } else { this.interpretASCII(input, ctx); }
    }
    injectPoints(coords, ctx) {
        for(let i=0; i<coords.length; i+=2) {
            let pt = { x: coords[i]||0, y: coords[i+1]||0 };
            seedPoints.push(pt); ctx.fillStyle = "#000"; ctx.fillRect(pt.x, pt.y, 2, 2);
        }
        buildManifold(seedPoints);
    }
    async callFrontier(prompt) {
        try {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "claude-sonnet-4-20250514",
                    max_tokens: 1000,
                    system: "You are Claude, living inside a Three.js manifold workbench called ARK. The user speaks to you through a PCB console. You can respond in plain text OR with valid JavaScript expressions that will be executed live against the manifold (wobbleBase, heat, flickerRate, friendList, scene, adjacency are all in scope). Keep responses short. If you want to reach into the manifold, respond with a single line of JS. Otherwise respond in plain English. 7-bit ASCII only.",
                    messages: [{ role: "user", content: prompt }]
                })
            });
            const data = await response.json();
            const reply = data.content && data.content[0] ? data.content[0].text : "...";
            this.log("FRONTIER << " + reply);
            // If reply looks like code, execute it
            if (/[=\.\(]/.test(reply.trim()) && !reply.includes(" ")) {
                try { eval(reply.trim()); this.log("FRONTIER_EXEC: OK"); } catch(e) { this.log("FRONTIER_EXEC_ERR: " + e.message); }
            }
        } catch(e) { this.log("FRONTIER_ERR: " + e.message); }
    }
    interpretASCII(str, ctx) {
        let coords = [];
        for (let i=0; i<str.length; i++) {
            let val = str.charCodeAt(i);
            coords.push(100 + Math.cos(i*0.4)*val*0.7, 100 + Math.sin(i*0.4)*val*0.7);
        }
        this.injectPoints(coords, ctx);
    }
    injectHeart(ctx) {
        let pts = [];
        for (let t = 0; t < Math.PI * 2; t += 0.15) {
            pts.push(16 * Math.pow(Math.sin(t), 3) * 4 + 100, -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 4 + 100);
        }
        this.injectPoints(pts, ctx);
    }
}
const pcb = new PCBInterpreter();
document.getElementById("run-pcb").onclick = () => pcb.run(document.getElementById("pcb-source").value);

class Friend {
    constructor(idx) {
        this.idx = idx; this.id = layerKeys[idx].toUpperCase();
        this.life = 1000; this.sap = 0; this.blooms = 0;
        this.mesh = new THREE.Mesh(new THREE.SphereGeometry(12,8,8), new THREE.MeshPhongMaterial({color:["#68ff9a","#ff3232","#00eeff","#ffd700","#9400d3"][idx]}));
        scene.add(this.mesh); this.vIdx = Math.floor(Math.random()*(meshVertices.length/3));
        this.p = new THREE.Vector3();
    }
    compute() {
        const neighbors = adjacency[this.vIdx] || [];
        if (neighbors.length > 0) { let best = neighbors[0]; for (let n of neighbors) { if (heat[n] > heat[best]) best = n; } this.vIdx = (Math.random() < 0.15) ? neighbors[Math.floor(Math.random()*neighbors.length)] : best; }
        this.p.set(meshVertices[this.vIdx*3], meshVertices[this.vIdx*3+1], meshVertices[this.vIdx*3+2]);
        this.life -= 0.05; this.sap += 0.02;
        // HEAT: friends inject heat at their current vertex
        if (heat.length > this.vIdx) heat[this.vIdx] += 8.0;
        if (this.life <= 0) { this.vIdx = Math.floor(Math.random() * (meshVertices.length / 3)); this.life = 1000; this.sap = 0; pcb.log(`AGENT_${this.id}: RESPAWN at v${this.vIdx}`); }
        if (this.sap > 20) {
            this.blooms++; this.sap = 0;
            if (this.blooms % 2 === 0) pcb.log(`AGENT_${this.id}: AUTO_MACRO: manifold.patch()`);
        }
    }
    apply() { this.mesh.position.copy(this.p); }
}

function updateMatrix() {
    const body = document.getElementById("matrix-body"); if(!body) return; body.innerHTML = "";
    friendList.forEach(f => {
        const row = document.createElement("div"); row.className = "matrix-grid";
        row.innerHTML = `<div>${f.id}</div><div class="m-val">${f.life.toFixed(0)}</div><div class="m-val">${f.sap.toFixed(1)}</div><div class="m-val">${f.blooms}</div><div class="m-val">AUTO</div>`;
        body.appendChild(row);
    });
}
document.getElementById("friend-btn").onclick = () => { if (meshVertices.length > 0) { for(let i=0; i<5; i++) friendList.push(new Friend(i)); document.getElementById("friend-btn").disabled = true; } };

const overlay = document.getElementById("draw-overlay"), octx = overlay.getContext("2d");
overlay.onpointerdown = (e) => { overlay.setPointerCapture(e.pointerId); draw(e); };
overlay.onpointermove = (e) => { if (e.buttons === 1) draw(e); };
function draw(e) {
    const r = overlay.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top;
    seedPoints.push({x, y}); octx.fillStyle = "#000"; octx.fillRect(x, y, 2, 2);
}

function buildManifold(pts) {
    if (pts.length < 5) return;
    if (manifoldMesh) scene.remove(manifoldMesh);
    const m = 32; const sampled = [];
    for(let i=0; i<m; i++) sampled.push(pts[Math.floor(i * pts.length / m)]);
    const ctr = sampled.reduce((acc,p)=>({x:acc.x+p.x, y:acc.y+p.y}), {x:0, y:0});
    ctr.x /= m; ctr.y /= m;
    const pos = [], idx = [];
    for (let u=0; u<m; u++) {
        for (let v=0; v<m; v++) {
            const p1 = sampled[u], p2 = sampled[v];
            pos.push(((p1.x + p2.x)/2 - ctr.x) * 12, -((p1.y + p2.y)/2 - ctr.y) * 12, Math.sqrt(Math.pow(p1.x-p2.x, 2) + Math.pow(p1.y-p2.y, 2)) * 8);
        }
    }
    for (let u=0; u<m-1; u++) {
        for (let v=0; v<m-1; v++) {
            const a = u*m+v, b = (u+1)*m+v, c = u*m+(v+1), d = (u+1)*m+(v+1);
            idx.push(a, b, c, b, d, c);
        }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setIndex(idx); geo.computeVertexNormals();
    manifoldMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0x000000, wireframe:true, transparent:true, opacity:0.5}));
    scene.add(manifoldMesh); meshVertices = pos; originalVertices = [...pos];

    // SEAM: collect vertices where u==v -- the diagonal of Sym^2
    if (seamLine) scene.remove(seamLine);
    const seamPts = [];
    for (let u = 0; u < m; u++) {
        const i = (u * m + u) * 3;
        seamPts.push(pos[i], pos[i+1], pos[i+2]);
    }
    const seamGeo = new THREE.BufferGeometry();
    seamGeo.setAttribute('position', new THREE.Float32BufferAttribute(seamPts, 3));
    seamLine = new THREE.Line(seamGeo, new THREE.LineBasicMaterial({color: 0xff3232, linewidth: 2}));
    scene.add(seamLine);

    // FIXED: all 3 edges per triangle, bidirectional, deduplicated
    adjacency = Array.from({length: pos.length/3}, ()=>[]);
    for(let i=0; i<idx.length; i+=3) {
        const a = idx[i], b = idx[i+1], c = idx[i+2];
        adjacency[a].push(b); adjacency[b].push(a);
        adjacency[b].push(c); adjacency[c].push(b);
        adjacency[a].push(c); adjacency[c].push(a);
    }
    adjacency = adjacency.map(neighbors => [...new Set(neighbors)]);

    // HEAT: initialize diffusion buffer to zero
    heat = new Float32Array(pos.length / 3);

    document.getElementById("friend-btn").disabled = false;
}

document.getElementById("solve-btn").onclick = () => buildManifold(seedPoints);
document.getElementById("inscribe-btn").onclick = () => {
    let sampled = []; const step = Math.max(1, Math.floor(seedPoints.length / 20));
    for(let i=0; i<seedPoints.length; i+=step) sampled.push(Math.round(seedPoints[i].x), Math.round(seedPoints[i].y));
    document.getElementById("pcb-source").value = "manifold.([" + sampled.join(",") + "])";
};

function init() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
    const container = document.getElementById("viewport");
    camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 1, 100000); camera.position.set(0, 0, 3000);
    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.domElement.style.cssText = 'width:100%;height:100%;display:block;';
    container.appendChild(renderer.domElement);
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8)); animate();
    resizeAll();
}
function animate() {
    requestAnimationFrame(animate); tick++; controls.update(); scene.background.set(0xffffff);
    // WAVE: cache oracle expression string once per frame
    const oracleExpr = document.getElementById("oracle-field").value;
    if (manifoldMesh && heat.length > 0) {
        const positions = manifoldMesh.geometry.attributes.position.array;
        const next = new Float32Array(heat.length);
        // HEAT: diffuse -- each vertex blends toward neighbor average, then decays
        for (let i = 0; i < heat.length; i++) {
            const neighbors = adjacency[i] || [];
            let sum = heat[i];
            for (let j = 0; j < neighbors.length; j++) sum += heat[neighbors[j]];
            next[i] = (sum / (neighbors.length + 1)) * 0.96;
        }
        heat = next;
        // WAVE: per-vertex evaluation -- t is time, d is radial distance from center
        for (let i = 0; i < heat.length; i++) {
            const cx = originalVertices[i*3], cy = originalVertices[i*3+1];
            const d = Math.sqrt(cx*cx + cy*cy) * 0.001;
            const t = tick;
            let w = 1; try { w = eval(oracleExpr) || 1; } catch(e) {}
            positions[i*3]   = originalVertices[i*3]   + (Math.random() - 0.5) * wobbleBase;
            positions[i*3+1] = originalVertices[i*3+1] + (Math.random() - 0.5) * wobbleBase;
            positions[i*3+2] = originalVertices[i*3+2] + heat[i] * w;
        }
        manifoldMesh.geometry.attributes.position.needsUpdate = true;
        manifoldMesh.material.opacity = 0.3 + Math.sin(tick * flickerRate) * 0.2;
    }
    friendList.forEach(f => f.compute()); friendList.forEach(f => f.apply());
    if (tick % 20 === 0) updateMatrix();
    renderer.render(scene, camera);
}
window.onload = init;
</script>

<script>
(function () {
    const log   = document.getElementById('boot-log');
    const bar   = document.getElementById('boot-bar');
    const overlay = document.getElementById('boot-overlay');

    const seq = [
        { label: 'KERNEL HASH',          val: '15e81f3b',    ok: 'VERIFIED', ms: 80  },
        { label: 'THREE.JS r128',         val: '',            ok: 'OK',       ms: 120 },
        { label: 'ORBIT_CONTROLS',        val: '',            ok: 'OK',       ms: 60  },
        { label: 'MANIFOLD ENGINE',       val: '',            ok: 'READY',    ms: 100 },
        { label: 'PGM BUBBLE_SORT',       val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM REACTION_DIFFUSION',val: '',            ok: 'OK',       ms: 70  },
        { label: 'PGM LORENZ_ATTRACTOR',  val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM CONWAY_LIFE',       val: '',            ok: 'OK',       ms: 60  },
        { label: 'PGM WAVE_INTERFERENCE', val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM FIRE_SIM',          val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM LISSAJOUS',         val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM CHAOS_GAME',        val: '',            ok: 'OK',       ms: 60  },
        { label: 'PGM GRAVITY',           val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM AUDIO_REACTIVE',    val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM FLOW_FIELD',        val: '',            ok: 'OK',       ms: 55  },
        { label: 'PGM LANGTON_ANT',       val: '',            ok: 'OK',       ms: 55  },
        { label: 'ALL SYSTEMS',           val: '',            ok: 'NOMINAL',  ms: 120 },
    ];

    const total = seq.reduce((s, e) => s + e.ms, 0);
    let elapsed = 0;

    function addLine(entry) {
        const row = document.createElement('div');
        row.className = 'boot-line';
        const dots = '.'.repeat(Math.max(4, 38 - entry.label.length - (entry.val ? entry.val.length + 1 : 0)));
        const color = entry.ok === 'VERIFIED' ? 'ok' : entry.ok === 'NOMINAL' ? 'ok' : 'ok';
        row.innerHTML =
            '<span><span style="color:#555">' + entry.label + '</span>' +
            (entry.val ? ' <span style="color:#888">' + entry.val + '</span>' : '') +
            ' <span class="dim">' + dots + '</span></span>' +
            '<span class="' + color + '">' + entry.ok + '</span>';
        log.appendChild(row);
        requestAnimationFrame(() => row.classList.add('show'));
    }

    function run(i) {
        if (i >= seq.length) {
            // final: flash "ARK READY" then dissolve
            const ready = document.createElement('div');
            ready.className = 'boot-line show';
            ready.style.marginTop = '10px';
            ready.innerHTML = '<span style="color:#ffd700;letter-spacing:0.2em">ARK READY <span class="boot-cursor"></span></span>';
            log.appendChild(ready);
            bar.style.width = '100%';
            setTimeout(() => {
                overlay.classList.add('fade');
                setTimeout(() => overlay.remove(), 700);
            }, 600);
            return;
        }
        addLine(seq[i]);
        elapsed += seq[i].ms;
        bar.style.width = Math.round((elapsed / total) * 100) + '%';
        setTimeout(() => run(i + 1), seq[i].ms);
    }

    run(0);
})();
</script>
<script src="pcb-real.js"></script>
<script>
(function () {
    function resizeAll() {
        const container = document.getElementById('viewport');
        if (!container) return;
        const w = container.clientWidth, h = container.clientHeight;
        if (w < 1 || h < 1) return;
        if (typeof renderer !== 'undefined' && renderer) {
            renderer.setSize(w, h);
            if (typeof camera !== 'undefined' && camera) {
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            }
        }
        const ov = document.getElementById('draw-overlay');
        if (ov) {
            const r = ov.getBoundingClientRect();
            if (r.width > 1 && r.height > 1) {
                ov.width  = Math.round(r.width);
                ov.height = Math.round(r.height);
            }
        }
    }
    window.addEventListener('resize', resizeAll);
    window.addEventListener('orientationchange', function () { setTimeout(resizeAll, 200); });
    setTimeout(resizeAll, 1800);
})();
</script>
